services:
  postgres:
    image: postgres:16
    container_name: buildtrack-postgres
    environment:
      POSTGRES_DB: buildtrack
      POSTGRES_USER: buildtrack
      POSTGRES_PASSWORD: buildtrack
    ports:
      - "5432:5432"
    volumes:
      - buildtrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildtrack -d buildtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  buildtrack-api:
    build: .
    container_name: buildtrack-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

volumes:
  buildtrack-postgres-data: