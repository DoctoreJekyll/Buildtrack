name: BuildTrack CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: buildtrack-java/pom.xml

      - name: Run tests
        run: mvn --batch-mode -f buildtrack-java/pom.xml clean test

  database-integration:
    name: Validate Flyway migrations
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: buildtrack
          POSTGRES_USER: buildtrack
          POSTGRES_PASSWORD: buildtrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U buildtrack -d buildtrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: buildtrack-java/pom.xml

      - name: Run PostgreSQL migration integration test
        run: >
          mvn --batch-mode
          -f buildtrack-java/pom.xml
          -Dtest=DatabaseMigrationIT
          test

  docker-build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - test
      - database-integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: buildtrack-java
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ vars.DOCKERHUB_USERNAME }}/buildtrack-api:latest